<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生鲜溯源管理系统</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.12), transparent 28%),
        linear-gradient(135deg, #f6fbff 0%, #eef4f8 100%);
      color: #172033;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .panel {
      width: min(420px, 100%);
      padding: 44px 38px 34px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 22px 70px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .mark {
      width: 58px;
      height: 58px;
      display: inline-grid;
      place-items: center;
      margin-bottom: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      color: #fff;
      font-size: 27px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 9px 0 30px;
      color: #697586;
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 16px;
      text-align: left;
    }

    label {
      display: grid;
      gap: 8px;
    }

    label span {
      color: #465467;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid #d7dee8;
      border-radius: 12px;
      background: #fbfdff;
      color: #172033;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .message {
      display: none;
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fef2f2;
      color: #b42318;
      font-size: 13px;
    }

    .message.show {
      display: block;
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .trace-link {
      display: inline-block;
      margin-top: 24px;
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .panel {
        padding: 36px 24px 28px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<main class="panel">
  <div class="mark">溯</div>
  <h1>生鲜溯源管理系统</h1>
  <p class="subtitle">企业管理后台登录</p>

  <form id="loginForm">
    <label>
      <span>用户名</span>
      <input id="username" name="username" autocomplete="username" placeholder="请输入用户名">
    </label>
    <label>
      <span>密码</span>
      <input id="password" name="password" autocomplete="current-password" type="password" placeholder="请输入密码">
    </label>
    <p id="message" class="message" role="alert"></p>
    <button id="submitButton" type="submit">登录</button>
  </form>

  <a class="trace-link" href="/trace">返回消费者查询页面</a>
</main>

<script>
  const form = document.getElementById('loginForm')
  const button = document.getElementById('submitButton')
  const message = document.getElementById('message')

  function showMessage(text) {
    message.textContent = text
    message.classList.add('show')
  }

  form.addEventListener('submit', async event => {
    event.preventDefault()
    message.classList.remove('show')

    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value

    if (username.length < 3) {
      showMessage('请输入至少 3 个字符的用户名')
      return
    }
    if (password.length < 6) {
      showMessage('请输入至少 6 个字符的密码')
      return
    }

    button.disabled = true
    button.textContent = '登录中...'

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`)
      }

      const res = await response.json()
      if (res.code === 200 && res.data) {
        localStorage.setItem('token', res.data.token)
        localStorage.setItem('userInfo', JSON.stringify(res.data.user))
        window.location.href = '/admin/dashboard'
        return
      }

      showMessage(res.message || '登录失败')
    } catch (error) {
      showMessage(`登录失败：${error.message || '网络错误'}`)
    } finally {
      button.disabled = false
      button.textContent = '登录'
    }
  })
</script>
</body>
</html>
